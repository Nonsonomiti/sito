<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musica - miti</title>
    <style>
        body {
            margin: 2rem 5vw; 
            background-color: #000000;
            color: #ffffff;
            /* Nessun font impostato = usa lo stesso identico della home */
        }

        /* Sposta il tasto home in alto a destra */
        .navigation {
            text-align: right;
            margin-bottom: 3rem;
        }

        .home-btn {
            font-size: 1.2rem;
            color: #ffffff;
            text-decoration: none;
        }

        .home-btn:hover {
            text-decoration: underline;
            font-style: italic;
        }

        /* Il blocco di testo di ogni canzone */
        .song-block {
            margin-bottom: 3rem; /* Spazio vuoto tra una canzone e l'altra */
            line-height: 1.4;    /* Spaziatura di lettura naturale */
        }

        /* Stile della parolina "link" */
        .song-block a {
            color: #ffffff;
            text-decoration: underline;
        }

        .song-block a:hover {
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="navigation">
        <a href="index.html" class="home-btn">home</a>
    </div>

    <div class="song-block">
        27/05/2026 Dance With Me - Adam Green <br>
        <a href="https://youtu.be/5325RtmKpEQ?si=Fqs6RZBks5aoBuhj" target="_blank">link</a>
    </div>

</body>
</html>
