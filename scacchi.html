<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scacchi - miti</title>
    <style>
        /* === ZONA MODIFICHE ESTETICHE === */
        
        body {
            /* Qui modifichi i margini generali della pagina */
            margin: 2rem 5vw; 
            /* Qui modifichi i colori di sfondo e del testo di tutta la pagina */
            background-color: #000000;
            color: #ffffff;
        }

        a {
            /* Colore base di TUTTI i link della pagina */
            color: #ffffff;
            text-decoration: none;
        }

        a:hover {
            /* Cosa succede quando passi il mouse sopra a un link */
            text-decoration: underline;
            font-style: italic;
        }

        .home-btn {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 3rem; /* Distanza tra il tasto home e il resto */
        }

        /* Stile specifico per il contenitore del tuo progetto GitHub */
        .repo-container {
            margin-top: 2rem;
            border-left: 2px solid #333; /* Una linea grigia verticale molto minimal a sinistra */
            padding-left: 1rem; /* Spazio tra la linea e il testo */
        }

        .repo-title {
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }

        /* Questo è il link vero e proprio della repo */
        .repo-link {
            font-family: monospace; /* Font stile "codice" per fargli dare un vibe da programmazione */
            color: #888; /* Grigio chiaro */
            font-size: 1rem;
        }

        .repo-link:hover {
            color: #fff; /* Diventa bianco al passaggio del mouse */
        }
    </style>
</head>
<body>

    <a href="index.html" class="home-btn">home</a>

    <div class="repo-container">
        <h2 class="repo-title">openrepertoire</h2>
        
        <a href="https://github.com/Nonsonomiti/openrepertoire" class="repo-link" target="_blank">github.com/Nonsonomiti/openrepertoire ↗</a>
    </div>

</body>
</html>
